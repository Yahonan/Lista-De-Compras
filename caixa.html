<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h2>🛒Lista de compras</h2>

   <div class="area-controles">
    
    <div class="grupo-inputs">
        <input type="text" id="nomeProduto" placeholder="Nome">
        <input type="number" id="precoProduto" placeholder="Preço R$">
    </div>

    <div class="grupo-botoes">
        <button onclick="adicionarProduto()" onkeydown="enterPressionado()" class="btnAdicionar">Adicionar Produto</button>
        <button id="btnLimparLista" class="btnRemover">Remover Lista</button>
    </div>

</div>

     <ul id="listaProdutos"></ul>
     <h2 id="valorTotal">Total R$ 0,00</h2>
     

    </main>
    
    <script src="index.js"></script>
</body>
</html>
